<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover - Review Hadits Digital</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1542856391-010fb87dcfed?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 35, 25, 0.65);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 900px;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.3;
            text-shadow: 2px 4px 10px rgba(212, 175, 55, 0.3);
            font-weight: 700;
        }
        .divider {
            height: 3px;
            width: 150px;
            background-color: #d4af37;
            margin: 20px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <h1>Pembahasan Psikologi dalam Hadits Nabi & Review Hadits Digital</h1>
        <div class="divider"></div>
    </div>

</body>
</html>
