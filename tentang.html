<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentang Penulis - Salman Mutawakkil</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f4;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .profile-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .profile-header {
            background: linear-gradient(135deg, #2c4c38, #1a3022);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #d4af37; /* Bingkai emas premium */
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            background-color: #fff;
        }
        .profile-name {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: bold;
            margin: 15px 0 5px 0;
            letter-spacing: 0.5px;
        }
        .profile-tag {
            color: #d4af37;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin: 0;
        }
        .profile-body {
            padding: 30px;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .info-table tr {
            border-bottom: 1px solid #f0f0f0;
        }
        .info-table tr:last-child {
            border-bottom: none;
        }
        .info-table td {
            padding: 12px 5px;
            font-size: 0.95rem;
            color: #333333;
        }
        .info-label {
            font-weight: bold;
            color: #2c4c38;
            width: 35%;
        }
        .info-value {
            width: 65%;
        }
        .profile-footer {
            background-color: #fafafa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #f0f0f0;
            font-size: 0.85rem;
            color: #666666;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-header">
            <img src="https://i.ibb.co/YFjnMLG0/IMG-20260311-WA0093.jpg" alt="Salman Mutawakkil" class="profile-avatar">
            <h1 class="profile-name">Salman Mutawakkil</h1>
            <p class="profile-tag">Penulis</p>
        </div>

        <div class="profile-body">
            <table class="info-table">
                <tr>
                    <td class="info-label">Nama Lengkap</td>
                    <td class="info-value">Salman Mutawakkil</td>
                </tr>
                <tr>
                    <td class="info-label">NIM</td>
                    <td class="info-value">251305022</td>
                </tr>
                <tr>
                    <td class="info-label">Program Studi</td>
                    <td class="info-value">Ilmu Hadits (Prodi: Ilmu Hadits)</td>
                </tr>
                <tr>
                    <td class="info-label">Fakultas</td>
                    <td class="info-value">Ushuluddin & Adab (FUDA)</td>
                </tr>
                <tr>
                    <td class="info-label">Kampus</td>
                    <td class="info-value">Universitas Islam Negeri Sultan Maulana Hasanuddin Banten</td>
                </tr>
                <tr>
                    <td class="info-label">Akademik</td>
                    <td class="info-value">Semester: 02 (Dua)</td>
                </tr>
            </table>
        </div>

        <div class="profile-footer">
            &copy; 2026 Review Hadits Digital. All Rights Reserved.
        </div>
    </div>

</body>
</html>
